apiVersion: v1
kind: ConfigMap
metadata:
  name: cbb-config
  namespace: cbb
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "https://api.cbb.example.com"
  NEXT_PUBLIC_AI_URL: "https://ai.cbb.example.com"
  AI_SERVICE_INTERNAL_URL: "http://ai-service:8000"
  NEXT_PUBLIC_LIVEKIT_URL: "wss://livekit.cbb.example.com"
  INSTITUTION_SSO_CONFIGURED: "true"
  OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
  EMBEDDING_PROVIDER: "openai"
  EMBEDDING_DIMENSIONS: "1536"
  VECTOR_BACKEND: "pinecone"
  PINECONE_INDEX_NAME: "cbb-course-content"
