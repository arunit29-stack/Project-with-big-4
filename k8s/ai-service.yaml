apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: cbb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      nodeSelector:
        workload-pool: ai
      containers:
        - name: ai-service
          image: cbb/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cbb-config
            - secretRef:
                name: cbb-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 35
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: cbb
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service
  namespace: cbb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: cbb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      nodeSelector:
        workload-pool: ai
      containers:
        - name: ai-worker
          image: cbb/ai-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.worker.celery_app
            - worker
            - --loglevel=INFO
            - -Q
            - rag-ingestion
          envFrom:
            - configMapRef:
                name: cbb-config
            - secretRef:
                name: cbb-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
