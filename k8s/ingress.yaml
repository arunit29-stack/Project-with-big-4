apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cbb-ingress
  namespace: cbb
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  tls:
    - hosts:
        - cbb.example.com
        - api.cbb.example.com
        - ai.cbb.example.com
      secretName: cbb-tls
  rules:
    - host: cbb.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: next-app
                port:
                  number: 3000
    - host: api.cbb.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  number: 4000
    - host: ai.cbb.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8000
